<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regional Performance</title>

 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  
  <link rel="stylesheet" href="style.css" />

  
  <style>

    
    .kpi-section {
      display: flex;
      gap: 30px;
      margin-bottom: 18px;
    }

    .kpi-card {
      flex: 1;
      background-color: #D2F7FF;
      border-radius: 20px;
      padding: 22px;
      text-align: center;
      min-height: 100px;
    }

    .kpi-label {
      font-size: 16px;
      font-weight: bold;
      color: #000;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: bold;
      color: #46639B;
      margin: 0;
    }

    
    .chart-row {
      display: flex;
      gap: 30px;
      margin-bottom: 18px;
      align-items: stretch;
    }

    .chart-card {
      background-color: #D2F7FF;
      border-radius: 20px;
      padding: 16px;
    }

    .pie-card  { flex: 1; }
    .line-card { flex: 3; }
    .bar-card  { flex: 1; }

    .chart-title {
      font-size: 14px;
      font-weight: 800;
      color: #000;
      margin-bottom: 10px;
    }

    .chart-img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      display: block;
      border-radius: 6px;
    }

    .pie-card .chart-img {
      max-height: 340px;
    }

    
    .form-section {
      background-color: #D2F7FF;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .form-top-row {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-title {
      font-size: 22px;
      font-weight: 800;
      color: #4F8F80;
      white-space: nowrap;
      margin: 0;
    }

    .form-group-label {
      font-size: 14px;
      font-weight: 700;
      color: #000;
      margin-bottom: 6px;
    }

    .checkbox-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #000;
      font-weight: 500;
      cursor: pointer;
    }

    .check-item input[type="checkbox"],
    .check-item input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: #4F8F80;
      cursor: pointer;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-buttons {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-bottom-row {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 180px;
      max-width: 280px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 700;
      color: #000;
      margin-bottom: 4px;
    }

    .custom-input {
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      padding: 6px 10px;
      width: 100%;
      font-family: Arial, sans-serif;
      color: #000;
    }

    .btn-apply {
      background-color: #2F426D;
      color: #fff;
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 8px 32px;
      border: none;
      border-radius: 8px;
      min-width: 110px;
      cursor: pointer;
    }

    .btn-apply:hover { background-color: #46639B; }

    .btn-reset {
      background-color: #2F426D;
      color: #fff;
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 8px 32px;
      border: none;
      border-radius: 8px;
      min-width: 110px;
      cursor: pointer;
    }

    .btn-reset:hover { background-color: #46639B; }

  </style>
</head>

<body>
  <div class="container">

    
    <header class="top-banner">
      <div class="banner-left">
        <h1>Regional Performance</h1>
      </div>
      <nav class="banner-nav">
        <a href="Index.html" class="active">Regional Performance</a>
        <a href="page2.html">Annual Sales Trends</a>
        <a href="page3.html">Product Performance</a>
      </nav>
    </header>


    
    <div class="kpi-section">

      <div class="kpi-card">
        <p class="kpi-label">Total Revenue (East)</p>
        <p class="kpi-value">$21,524.36</p>
      </div>

      <div class="kpi-card">
        <p class="kpi-label">Total Revenue (West)</p>
        <p class="kpi-value">$11,801.82</p>
      </div>

      <div class="kpi-card">
        <p class="kpi-label">Unit Sold (East)</p>
        <p class="kpi-value">9,656 units</p>
      </div>

      <div class="kpi-card">
        <p class="kpi-label">Unit Sold (West)</p>
        <p class="kpi-value">5,786 units</p>
      </div>

    </div>


    
    <div class="chart-row">

      <div class="chart-card pie-card">
        <h2 class="chart-title">REVENUE BY REGION</h2>
        
        <img src="pie_chart.png" alt="Revenue by Region donut chart" class="chart-img" />
      </div>

      <div class="chart-card line-card">
        <h2 class="chart-title">MONTHLY REVENUE BY REGION</h2>
        
        <img src="monthly_revenue_by_region.png" alt="Monthly Revenue by Region" class="chart-img" />
      </div>

    </div>


    
    <div class="chart-row">

      <div class="chart-card bar-card">
        
        <img src="units_sold_by_product_east.png" alt="Units Sold by Product East" class="chart-img" />
      </div>

      <div class="chart-card bar-card">
        
        <img src="units_sold_by_product_west.png" alt="Units Sold by Product West" class="chart-img" />
      </div>

    </div>


    
    <section class="form-section">
      <form id="filterForm">

        <div class="form-top-row">

          <h2 class="filter-title">Filter Report</h2>

          
          <div>
            <p class="form-group-label">Show metrics:</p>
            <div class="checkbox-group">
              <label class="check-item">
                <input type="checkbox" id="showRevenue" name="showRevenue" value="revenue" checked />
                Revenue
              </label>
              <label class="check-item">
                <input type="checkbox" id="showUnits" name="showUnits" value="units" checked />
                Units Sold
              </label>
              <label class="check-item">
                <input type="checkbox" id="showAvgPrice" name="showAvgPrice" value="avgprice" />
                Avg Unit Price
              </label>
              <label class="check-item">
                <input type="checkbox" id="showYoY" name="showYoY" value="yoy" />
                YoY Growth
              </label>
            </div>
          </div>

         
          <div>
            <p class="form-group-label">view by:</p>
            <div class="radio-group">
              <label class="check-item">
                <input type="radio" name="viewBy" id="viewRegion" value="region" checked />
                Region
              </label>
              <label class="check-item">
                <input type="radio" name="viewBy" id="viewCategory" value="category" />
                Category
              </label>
              <label class="check-item">
                <input type="radio" name="viewBy" id="viewCity" value="city" />
                City
              </label>
            </div>
          </div>

          
          <div class="form-buttons">
            <button type="submit" class="btn-apply" value="apply">Apply</button>
            <button type="reset" class="btn-reset" value="reset">Reset</button>
          </div>

        </div>

        
        <div class="form-bottom-row">

          
          <div class="form-field">
            <label for="analystName" class="input-label">Analyst Name</label>
            <input type="text" id="analystName" name="analystName" class="custom-input" />
          </div>

          
          <div class="form-field">
            <label for="regionSelect" class="input-label">Region</label>
            <select id="regionSelect" name="regionSelect" class="custom-input">
              <option value="both" selected>Both</option>
              <option value="east">East</option>
              <option value="west">West</option>
            </select>
          </div>

          
          <div class="form-field">
            <label for="dateRange" class="input-label">Date Range</label>
            <input type="text" id="dateRange" name="dateRange" class="custom-input" />
          </div>

        </div>

      </form>
    </section>


  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
